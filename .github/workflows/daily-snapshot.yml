name: Daily snapshot

on:
  schedule:
    # 01:30 UTC ≈ 08:30 WIB
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run snapshot:daily

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/dailySnapshots/
          if git diff --staged --quiet; then
            echo "No new snapshot to commit"
          else
            git commit -m "snapshot: daily top repo $(date -u +%Y-%m-%d)"
            git push
          fi
